<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">TubeArchive</title>
  <desc id="desc">A camera aperture and archive tray mark with the TubeArchive wordmark.</desc>
  <defs>
    <linearGradient id="markGradient" x1="38" y1="28" x2="206" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12B5CB"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="trayGradient" x1="49" y1="161" x2="185" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="960" height="240" fill="#F8FAFC"/>

  <g filter="url(#softShadow)">
    <rect x="36" y="30" width="174" height="174" rx="38" fill="url(#markGradient)"/>
    <path d="M76 163h94l15 24H61l15-24Z" fill="url(#trayGradient)"/>
    <path d="M86 151h74c7 0 12 5 12 12v4H74v-4c0-7 5-12 12-12Z" fill="#FDE68A"/>
    <circle cx="123" cy="105" r="54" fill="#E0F2FE" opacity="0.96"/>
    <circle cx="123" cy="105" r="26" fill="#0F172A"/>
    <circle cx="123" cy="105" r="11" fill="#38BDF8"/>
    <path d="M123 51c17 0 32 8 42 20l-41 20-13-38c4-1 8-2 12-2Z" fill="#FFFFFF" opacity="0.86"/>
    <path d="M174 91c2 16-3 33-14 46l-25-38 35-20c2 4 3 8 4 12Z" fill="#FFFFFF" opacity="0.72"/>
    <path d="M139 157c-16 5-34 2-48-8l34-29 31 26c-5 5-10 8-17 11Z" fill="#FFFFFF" opacity="0.68"/>
    <path d="M70 112c-3-17 2-34 13-47l27 37-33 23c-3-4-5-8-7-13Z" fill="#FFFFFF" opacity="0.64"/>
  </g>

  <g fill="#0F172A">
    <text x="250" y="112" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="64" font-weight="800">TubeArchive</text>
    <text x="254" y="154" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="600" fill="#475569">4K footage pipeline for creators on macOS</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">
    <rect x="255" y="177" width="92" height="34" rx="17" fill="#DBEAFE"/>
    <text x="278" y="200" fill="#1D4ED8">HEVC</text>
    <rect x="359" y="177" width="110" height="34" rx="17" fill="#CCFBF1"/>
    <text x="381" y="200" fill="#0F766E">10-bit</text>
    <rect x="481" y="177" width="164" height="34" rx="17" fill="#FEF3C7"/>
    <text x="503" y="200" fill="#B45309">VideoToolbox</text>
    <rect x="657" y="177" width="94" height="34" rx="17" fill="#E0E7FF"/>
    <text x="680" y="200" fill="#4338CA">TUI</text>
